# Production stack for the single EC2 host (see ADR 0006). Run with:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# The API image is built in CI and pulled from GHCR (IMAGE_TAG defaults to
# latest). Postgres + Redis run on-box; S3 + SQS are real AWS services. Caddy
# terminates TLS automatically for ${DOMAIN}.
name: portfolio

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Publish 5432 on the box so the off-box digest Fargate task can reach it
    # (ADR 13; the app/worker still use the docker network name "postgres").
    # Defaults to 0.0.0.0: inbound 5432 is gated by the web SG, which admits
    # only the digest SG, so it is not internet-exposed. To bind the private
    # interface only, seed POSTGRES_HOST_BIND with the box private IP in SSM
    # (aws ssm put-parameter /portfolio/env/POSTGRES_HOST_BIND) and redeploy.
    ports:
      - "${POSTGRES_HOST_BIND:-0.0.0.0}:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio}"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  api:
    image: ghcr.io/alifyandra/portfolio-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8080"

  worker:
    image: ghcr.io/alifyandra/portfolio-backend:${IMAGE_TAG:-latest}
    command: ["worker"]
    restart: unless-stopped
    pull_policy: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set in .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
