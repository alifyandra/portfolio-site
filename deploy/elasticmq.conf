# Local SQS emulator config. Predeclares the "jobs" queue so the worker can poll
# without an AWS account. Queue URL: http://elasticmq:9324/000000000000/jobs
include classpath("application.conf")

node-address {
    protocol = http
    host = "elasticmq"
    port = 9324
    context-path = ""
}

rest-sqs {
    enabled = true
    bind-port = 9324
    bind-hostname = "0.0.0.0"
    sqs-limits = strict
}

queues {
    jobs {
        defaultVisibilityTimeout = 30 seconds
        receiveMessageWait = 0 seconds
    }
}
