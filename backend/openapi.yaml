          maxLength: 280
          type: string
        tags:
          items:
            type: string
          type:
            - array
            - "null"
        title:
          minLength: 1
          type: string
      required:
        - slug
        - title
        - summary
      type: object
    ErrorDetail:
      additionalProperties: false
