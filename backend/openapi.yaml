components:
  schemas:
    CreateContactInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateContactInputBody.json
          format: uri
          readOnly: true
          type: string
        body:
          minLength: 1
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        name:
          maxLength: 120
          minLength: 1
          type: string
        website:
          type: string
      required:
        - name
        - email
        - body
      type: object
    CreateContactOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateContactOutputBody.json
          format: uri
          readOnly: true
          type: string
        id:
          format: int64
          type: integer
        message:
          type: string
      required:
        - id
        - message
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    ListProjectsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListProjectsOutputBody.json
          format: uri
          readOnly: true
          type: string
        projects:
          items:
            $ref: "#/components/schemas/ProjectDTO"
          type:
            - array
            - "null"
      required:
        - projects
      type: object
    NowPlayingOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/NowPlayingOutputBody.json
          format: uri
          readOnly: true
          type: string
        album:
          type: string
        album_image:
          type: string
        artists:
          items:
            type: string
          type:
            - array
            - "null"
        is_playing:
          type: boolean
        song_url:
          type: string
        title:
          type: string
      required:
        - is_playing
      type: object
    ProjectDTO:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ProjectDTO.json
          format: uri
          readOnly: true
          type: string
        description:
          type: string
        featured:
          type: boolean
        image_keys:
          items:
            type: string
          type:
            - array
            - "null"
        live_url:
          type: string
        repo_url:
          type: string
        slug:
          type: string
        summary:
          type: string
        tags:
          items:
            type: string
          type:
            - array
            - "null"
        title:
          type: string
      required:
        - slug
        - title
        - summary
        - description
        - tags
        - image_keys
        - featured
      type: object
info:
  description: Backend API for alifyandra's portfolio site.
  title: Portfolio API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/contact:
    post:
      operationId: create-contact-message
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContactOutputBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Submit a contact message
      tags:
        - contact
  /api/projects:
    get:
      operationId: list-projects
      parameters:
        - description: If true, only featured projects
          explode: false
          in: query
          name: featured
          schema:
            description: If true, only featured projects
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProjectsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List projects
      tags:
        - projects
  /api/projects/{slug}:
    get:
      operationId: get-project
      parameters:
        - description: Project slug
          in: path
          name: slug
          required: true
          schema:
            description: Project slug
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a project by slug
      tags:
        - projects
  /api/spotify/now-playing:
    get:
      operationId: get-spotify-now-playing
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NowPlayingOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get Alif's currently-playing Spotify track
      tags:
        - spotify
