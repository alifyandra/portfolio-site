components:
  schemas:
    AccessGrantDTO:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/AccessGrantDTO.json
          format: uri
          readOnly: true
          type: string
        created_at:
          type: string
        email:
          type: string
        tier:
          type: string
      required:
        - email
        - tier
        - created_at
      type: object
    AdminProjectDTO:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/AdminProjectDTO.json
          format: uri
          readOnly: true
          type: string
        created_at:
          type: string
        description:
          type: string
        featured:
          type: boolean
        id:
          format: int64
          type: integer
        image_keys:
          items:
            type: string
          type:
            - array
            - "null"
        live_url:
          type: string
        repo_url:
          type: string
        slug:
          type: string
        sort_order:
          format: int64
          type: integer
        summary:
          type: string
        tags:
          items:
            type: string
          type:
            - array
            - "null"
        title:
          type: string
        updated_at:
          type: string
      required:
        - id
        - slug
        - title
        - summary
        - description
        - tags
        - repo_url
        - live_url
        - image_keys
        - featured
        - sort_order
        - created_at
        - updated_at
      type: object
    ApiTokenDTO:
      additionalProperties: false
      properties:
        created_at:
          type: string
        expires_at:
          type: string
        id:
          format: int64
          type: integer
        last_used_at:
          type: string
        name:
          type: string
        runner:
          type: string
        scope:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - id
        - name
        - runner
        - scope
        - created_at
      type: object
    ArtistBody:
      additionalProperties: false
      properties:
        image:
          type: string
        name:
          type: string
        url:
          type: string
      required:
        - name
      type: object
    BatchDTO:
      additionalProperties: false
      properties:
        created_at:
          type: string
        error:
          type: string
        failed:
          format: int64
          type: integer
        id:
          format: int64
          type: integer
        list_name:
          type: string
        sent:
          format: int64
          type: integer
        skipped:
          format: int64
          type: integer
        status:
          type: string
        template_name:
          type: string
        total:
          format: int64
          type: integer
      required:
        - id
        - status
        - template_name
        - list_name
        - total
        - sent
        - skipped
        - failed
        - created_at
      type: object
    ClaimOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ClaimOutputBody.json
          format: uri
          readOnly: true
          type: string
        artifacts:
          items:
            $ref: "#/components/schemas/ClaimedArtifactDTO"
          type:
            - array
            - "null"
        claimed:
          description: false when there was no runnable work for this job
          type: boolean
        date:
          description: the run's scheduled day (YYYY-MM-DD); the digest idempotency key
          type: string
        job:
          type: string
        job_run_id:
          description: the run to pass back to /complete
          format: int64
          type: integer
        lease_ttl_seconds:
          description: how long the claim lease is held before the artifacts become reclaimable
          format: int64
          type: integer
      required:
        - claimed
      type: object
    ClaimedArtifactDTO:
      additionalProperties: false
      properties:
        content:
          type: string
        content_type:
          type: string
        id:
          format: int64
          type: integer
        label:
          type: string
        size_bytes:
          format: int64
          type: integer
        url:
          type: string
      required:
        - id
        - label
        - content_type
        - size_bytes
      type: object
    CompleteInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CompleteInputBody.json
          format: uri
          readOnly: true
          type: string
        artifact_ids:
          description: the claimed artifacts to mark done; each must belong to job_run_id and be claimed by this runner
          items:
            format: int64
            type: integer
          type:
            - array
            - "null"
        content:
          description: inline result content (the digest markdown)
          type: string
        content_key:
          description: S3 key of a large result previously uploaded via the presigned PUT; must be under the server-issued work-results/ prefix
          type: string
        error:
          description: failure reason when status is failed
          type: string
        job:
          description: ScheduledJob key; must be in the token's scope
          minLength: 1
          type: string
        job_run_id:
          description: the run returned by /claim, to close; must be a run this runner claimed under this job
          format: int64
          type: integer
        status:
          description: terminal outcome; defaults to completed
          enum:
            - completed
            - failed
          type: string
        upload_content_type:
          description: request a presigned PUT for a large result of this MIME type
          type: string
      required:
        - job
      type: object
    CompleteOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CompleteOutputBody.json
          format: uri
          readOnly: true
          type: string
        done:
          description: true when the run was closed; false when an upload URL was returned instead
          type: boolean
        upload:
          $ref: "#/components/schemas/UploadTicketDTO"
      required:
        - done
      type: object
    CreateBatchInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateBatchInputBody.json
          format: uri
          readOnly: true
          type: string
        list_id:
          format: int64
          type: integer
        template_id:
          format: int64
          type: integer
      required:
        - template_id
        - list_id
      type: object
    CreateContactInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateContactInputBody.json
          format: uri
          readOnly: true
          type: string
        body:
          minLength: 1
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        name:
          maxLength: 120
          minLength: 1
          type: string
        website:
          type: string
      required:
        - name
        - email
        - body
      type: object
    CreateContactOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateContactOutputBody.json
          format: uri
          readOnly: true
          type: string
        id:
          format: int64
          type: integer
        message:
          type: string
      required:
        - id
        - message
      type: object
    CreateGrantInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateGrantInputBody.json
          format: uri
          readOnly: true
          type: string
        email:
          description: Email to grant access to; normalized to lowercase before storage
          format: email
          maxLength: 254
          minLength: 3
          type: string
        tier:
          description: Access tier to confer (admin or friend)
          enum:
            - admin
            - friend
          type: string
      required:
        - email
        - tier
      type: object
    CreateJobInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateJobInputBody.json
          format: uri
          readOnly: true
          type: string
        config:
          additionalProperties: {}
          description: Free-form per-job settings read at run time (e.g. source filters, model id); the shape is job-specific
          type: object
        enabled:
          description: Whether the ticker fires this job; defaults to false so a newly registered job stays dormant until an admin turns it on
          type: boolean
        key:
          description: Stable machine key from the job-kinds registry, e.g. "digest.scrape". Must be one the worker can dispatch; the stage is derived from it
          minLength: 1
          type: string
        name:
          description: Human label shown in the /admin Jobs list
          minLength: 1
          type: string
        runner:
          description: "Where the job may run: server (on-box worker), local (external runner), or any; defaults to server"
          enum:
            - server
            - local
            - any
          type: string
        schedule:
          description: Standard cron expression (robfig/cron form) evaluated in the timezone
          minLength: 1
          type: string
        timezone:
          description: IANA timezone name the cron is evaluated in (e.g. UTC, Australia/Melbourne); defaults to UTC
          type: string
      required:
        - key
        - name
        - schedule
      type: object
    CreatePlaylistInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreatePlaylistInputBody.json
          format: uri
          readOnly: true
          type: string
        input:
          description: A Spotify playlist share URL, a spotify:playlist:{id} URI, or a bare playlist ID
          minLength: 1
          type: string
      required:
        - input
      type: object
    CreateProjectInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateProjectInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          description: Longer markdown body
          type: string
        featured:
          type: boolean
        image_keys:
          description: S3 object keys returned by the upload presign endpoint
          items:
            type: string
          type:
            - array
            - "null"
        live_url:
          type: string
        repo_url:
          type: string
        slug:
          description: URL-friendly unique identifier
          maxLength: 120
          minLength: 1
          type: string
        sort_order:
          description: Lower sorts first
          format: int64
          type: integer
        summary:
          description: Short one-liner shown in cards/lists
          maxLength: 280
          type: string
        tags:
          items:
            type: string
          type:
            - array
            - "null"
        title:
          minLength: 1
          type: string
      required:
        - slug
        - title
        - summary
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    Item:
      additionalProperties: false
      properties:
        id:
          format: int64
          type: integer
        sort_order:
          format: int64
          type: integer
      required:
        - id
        - sort_order
      type: object
    JobDTO:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/JobDTO.json
          format: uri
          readOnly: true
          type: string
        created_at:
          type: string
        enabled:
          type: boolean
        id:
          format: int64
          type: integer
        key:
          type: string
        last_run_at:
          type: string
        last_status:
          description: status of the most recent run, empty when the job has never run
          type: string
        name:
          type: string
        next_run_at:
          type: string
        runner:
          type: string
        schedule:
          type: string
        stage:
          type: string
        timezone:
          type: string
        updated_at:
          type: string
      required:
        - id
        - key
        - name
        - stage
        - enabled
        - schedule
        - timezone
        - runner
        - created_at
        - updated_at
      type: object
    JobKindDTO:
      additionalProperties: false
      properties:
        default_schedule:
          type: string
        default_timezone:
          type: string
        description:
          type: string
        key:
          type: string
        name:
          type: string
        stage:
          type: string
      required:
        - key
        - name
        - stage
        - default_schedule
        - default_timezone
        - description
      type: object
    JobRunDTO:
      additionalProperties: false
      properties:
        created_at:
          type: string
        duration_seconds:
          description: finished_at - started_at, when both are set
          format: int64
          type: integer
        error:
          type: string
        finished_at:
          type: string
        id:
          format: int64
          type: integer
        runner:
          type: string
        scheduled_for:
          type: string
        started_at:
          type: string
        status:
          type: string
        trigger:
          type: string
      required:
        - id
        - status
        - trigger
        - scheduled_for
        - created_at
      type: object
    LineError:
      additionalProperties: false
      properties:
        line:
          format: int64
          type: integer
        raw:
          type: string
        reason:
          type: string
      required:
        - line
        - raw
        - reason
      type: object
    ListAdminProjectsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListAdminProjectsOutputBody.json
          format: uri
          readOnly: true
          type: string
        projects:
          items:
            $ref: "#/components/schemas/AdminProjectDTO"
          type:
            - array
            - "null"
      required:
        - projects
      type: object
    ListBatchesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListBatchesOutputBody.json
          format: uri
          readOnly: true
          type: string
        batches:
          items:
            $ref: "#/components/schemas/BatchDTO"
          type:
            - array
            - "null"
        daily_remaining:
          format: int64
          type: integer
      required:
        - batches
        - daily_remaining
      type: object
    ListBodyInput:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListBodyInput.json
          format: uri
          readOnly: true
          type: string
        country_code:
          description: Per-list country code (1-4 digits); empty inherits the user default
          pattern: ^([0-9]{1,4})?$
          type: string
        name:
          maxLength: 120
          minLength: 1
          type: string
        recipients_text:
          type: string
      required:
        - name
        - recipients_text
      type: object
    ListDTO:
      additionalProperties: false
      properties:
        country_code:
          type: string
        created_at:
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
        recipient_count:
          format: int64
          type: integer
        recipients:
          items:
            $ref: "#/components/schemas/RecipientDTO"
          type:
            - array
            - "null"
        updated_at:
          type: string
      required:
        - id
        - name
        - country_code
        - recipient_count
        - created_at
        - updated_at
      type: object
    ListGrantsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListGrantsOutputBody.json
          format: uri
          readOnly: true
          type: string
        grants:
          items:
            $ref: "#/components/schemas/AccessGrantDTO"
          type:
            - array
            - "null"
      required:
        - grants
      type: object
    ListJobKindsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListJobKindsOutputBody.json
          format: uri
          readOnly: true
          type: string
        kinds:
          items:
            $ref: "#/components/schemas/JobKindDTO"
          type:
            - array
            - "null"
      required:
        - kinds
      type: object
    ListJobRunsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListJobRunsOutputBody.json
          format: uri
          readOnly: true
          type: string
        runs:
          items:
            $ref: "#/components/schemas/JobRunDTO"
          type:
            - array
            - "null"
        total:
          description: total runs for this job, for paging
          format: int64
          type: integer
      required:
        - runs
        - total
      type: object
    ListJobsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListJobsOutputBody.json
          format: uri
          readOnly: true
          type: string
        jobs:
          items:
            $ref: "#/components/schemas/JobDTO"
          type:
            - array
            - "null"
      required:
        - jobs
      type: object
    ListListsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListListsOutputBody.json
          format: uri
          readOnly: true
          type: string
        lists:
          items:
            $ref: "#/components/schemas/ListDTO"
          type:
            - array
            - "null"
      required:
        - lists
      type: object
    ListOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListOutputBody.json
          format: uri
          readOnly: true
          type: string
        invalid_lines:
          items:
            $ref: "#/components/schemas/LineError"
          type:
            - array
            - "null"
        list:
          $ref: "#/components/schemas/ListDTO"
      required:
        - list
      type: object
    ListPlaylistsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListPlaylistsOutputBody.json
          format: uri
          readOnly: true
          type: string
        playlists:
          items:
            $ref: "#/components/schemas/PlaylistDTO"
          type:
            - array
            - "null"
      required:
        - playlists
      type: object
    ListProjectsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListProjectsOutputBody.json
          format: uri
          readOnly: true
          type: string
        projects:
          items:
            $ref: "#/components/schemas/ProjectDTO"
          type:
            - array
            - "null"
      required:
        - projects
      type: object
    ListTemplatesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListTemplatesOutputBody.json
          format: uri
          readOnly: true
          type: string
        templates:
          items:
            $ref: "#/components/schemas/TemplateDTO"
          type:
            - array
            - "null"
      required:
        - templates
      type: object
    ListTokensOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListTokensOutputBody.json
          format: uri
          readOnly: true
          type: string
        tokens:
          items:
            $ref: "#/components/schemas/ApiTokenDTO"
          type:
            - array
            - "null"
      required:
        - tokens
      type: object
    MessageOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/MessageOutputBody.json
          format: uri
          readOnly: true
          type: string
        message:
          type: string
      required:
        - message
      type: object
    MintTokenInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/MintTokenInputBody.json
          format: uri
          readOnly: true
          type: string
        expires_at:
          description: Optional RFC3339 expiry; empty means the token never expires
          type: string
        name:
          description: Human label for the token, e.g. "laptop Claude Code"
          minLength: 1
          type: string
        runner:
          description: Runner identity this token authenticates as, e.g. "laptop", "home-finance"
          minLength: 1
          type: string
        scope:
          description: Job keys this token may claim/complete work for; empty authorizes nothing
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - name
        - runner
      type: object
    MintTokenOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/MintTokenOutputBody.json
          format: uri
          readOnly: true
          type: string
        api_token:
          $ref: "#/components/schemas/ApiTokenDTO"
        token:
          description: The raw bearer token, shown ONCE. Store it now; it cannot be recovered.
          type: string
      required:
        - token
        - api_token
      type: object
    NowPlayingOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/NowPlayingOutputBody.json
          format: uri
          readOnly: true
          type: string
        source:
          type: string
        track:
          $ref: "#/components/schemas/TrackBody"
      required:
        - source
      type: object
    PlaylistBody:
      additionalProperties: false
      properties:
        image:
          type: string
        name:
          type: string
        url:
          type: string
      required:
        - name
      type: object
    PlaylistDTO:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/PlaylistDTO.json
          format: uri
          readOnly: true
          type: string
        created_at:
          type: string
        id:
          format: int64
          type: integer
        sort_order:
          format: int64
          type: integer
        spotify_id:
          type: string
        updated_at:
          type: string
      required:
        - id
        - spotify_id
        - sort_order
        - created_at
        - updated_at
      type: object
    PlaylistsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/PlaylistsOutputBody.json
          format: uri
          readOnly: true
          type: string
        playlists:
          items:
            $ref: "#/components/schemas/PlaylistBody"
          type:
            - array
            - "null"
      required:
        - playlists
      type: object
    PresignUploadInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/PresignUploadInputBody.json
          format: uri
          readOnly: true
          type: string
        content_type:
          description: MIME type of the file to upload
          enum:
            - image/png
            - image/jpeg
            - image/webp
            - image/gif
          type: string
        ext:
          description: Optional file extension override (alphanumeric, no dot); defaults to one derived from content_type
          type: string
      required:
        - content_type
      type: object
    PresignUploadOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/PresignUploadOutputBody.json
          format: uri
          readOnly: true
          type: string
        headers:
          additionalProperties:
            type: string
          description: Headers that must be sent verbatim on the PUT (Content-Type is bound into the signature)
          type: object
        key:
          description: Object key to store in Project.image_keys after a successful upload
          type: string
        method:
          description: HTTP method to use for the upload (always PUT)
          type: string
        url:
          description: Presigned S3 URL to PUT the file to
          type: string
      required:
        - url
        - key
        - method
        - headers
      type: object
    ProjectDTO:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ProjectDTO.json
          format: uri
          readOnly: true
          type: string
        description:
          type: string
        featured:
          type: boolean
        image_keys:
          items:
            type: string
          type:
            - array
            - "null"
        live_url:
          type: string
        repo_url:
          type: string
        slug:
          type: string
        summary:
          type: string
        tags:
          items:
            type: string
          type:
            - array
            - "null"
        title:
          type: string
      required:
        - slug
        - title
        - summary
        - description
        - tags
        - image_keys
        - featured
      type: object
    RecipientDTO:
      additionalProperties: false
      properties:
        name:
          type: string
        phone:
          type: string
      required:
        - phone
        - name
      type: object
    ReorderPlaylistsInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ReorderPlaylistsInputBody.json
          format: uri
          readOnly: true
          type: string
        items:
          description: New sort_order for each playlist id
          items:
            $ref: "#/components/schemas/Item"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    ReorderProjectsInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ReorderProjectsInputBody.json
          format: uri
          readOnly: true
          type: string
        items:
          description: New sort_order for each project id
          items:
            $ref: "#/components/schemas/Item"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    StartJobRunOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/StartJobRunOutputBody.json
          format: uri
          readOnly: true
          type: string
        message:
          description: why a run was not started (e.g. no worker configured)
          type: string
        run:
          $ref: "#/components/schemas/JobRunDTO"
          description: the queued run when started is true
        started:
          description: true when a run was enqueued; false when no worker is running to pick it up
          type: boolean
      required:
        - started
      type: object
    TemplateDTO:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/TemplateDTO.json
          format: uri
          readOnly: true
          type: string
        body:
          type: string
        created_at:
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
        updated_at:
          type: string
      required:
        - id
        - name
        - body
        - created_at
        - updated_at
      type: object
    TemplateInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/TemplateInputBody.json
          format: uri
          readOnly: true
          type: string
        body:
          minLength: 1
          type: string
        name:
          maxLength: 120
          minLength: 1
          type: string
      required:
        - name
        - body
      type: object
    TopArtistsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/TopArtistsOutputBody.json
          format: uri
          readOnly: true
          type: string
        artists:
          items:
            $ref: "#/components/schemas/ArtistBody"
          type:
            - array
            - "null"
      required:
        - artists
      type: object
    TopTracksOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/TopTracksOutputBody.json
          format: uri
          readOnly: true
          type: string
        tracks:
          items:
            $ref: "#/components/schemas/TrackBody"
          type:
            - array
            - "null"
      required:
        - tracks
      type: object
    TrackBody:
      additionalProperties: false
      properties:
        album:
          type: string
        album_image:
          type: string
        artists:
          items:
            type: string
          type:
            - array
            - "null"
        is_playing:
          type: boolean
        song_url:
          type: string
        title:
          type: string
      required:
        - is_playing
      type: object
    UpdateJobInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpdateJobInputBody.json
          format: uri
          readOnly: true
          type: string
        enabled:
          description: Enable or disable the job; the ticker only fires enabled jobs
          type: boolean
        runner:
          description: "Where the job may run: server (on-box worker), local (external runner), or any"
          enum:
            - server
            - local
            - any
          type: string
        schedule:
          description: Standard cron expression (robfig/cron form) evaluated in the timezone
          type: string
        timezone:
          description: IANA timezone name the cron is evaluated in (e.g. UTC, Australia/Melbourne)
          type: string
      type: object
    UpdateProjectInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpdateProjectInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          type: string
        featured:
          type: boolean
        image_keys:
          items:
            type: string
          type: array
        live_url:
          type: string
        repo_url:
          type: string
        slug:
          maxLength: 120
          minLength: 1
          type: string
        sort_order:
          format: int64
          type: integer
        summary:
          maxLength: 280
          type: string
        tags:
          items:
            type: string
          type: array
        title:
          minLength: 1
          type: string
      type: object
    UpdateTemplateInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpdateTemplateInputBody.json
          format: uri
          readOnly: true
          type: string
        body:
          minLength: 1
          type: string
        name:
          maxLength: 120
          minLength: 1
          type: string
      required:
        - name
        - body
      type: object
    UpdateUserInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpdateUserInputBody.json
          format: uri
          readOnly: true
          type: string
        ack_welcome:
          description: When true, records that the user has seen the Welcome at their current role (sets greeted_role server-side to the caller's own role; a client cannot assert a role). See ADR 10.
          type: boolean
        default_country_code:
          description: Default WhatsApp country code (digits only, no +), 1-4 digits. Omit to leave unchanged.
          pattern: ^[0-9]{1,4}$
          type: string
        nickname:
          description: Self-chosen display name, 1-40 characters after trimming (control characters are stripped). Send null to clear it; omit to leave it unchanged. See ADR 10.
          type:
            - string
            - "null"
      type: object
    UploadTicketDTO:
      additionalProperties: false
      properties:
        headers:
          additionalProperties:
            type: string
          description: headers to send verbatim on the PUT (Content-Type is bound into the signature)
          type: object
        key:
          type: string
        method:
          type: string
        url:
          type: string
      required:
        - url
        - key
        - method
        - headers
      type: object
    UserOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UserOutputBody.json
          format: uri
          readOnly: true
          type: string
        avatar_url:
          type: string
        default_country_code:
          description: Default WhatsApp country code (digits only) that replaces a leading trunk 0; overridable per recipient list (see ADR 11)
          type: string
        email:
          type: string
        greeted_role:
          description: The role at which the user was last shown the full Welcome; null means never welcomed. Server-owned (see ADR 10)
          enum:
            - admin
            - friend
            - member
          type:
            - string
            - "null"
        id:
          format: int64
          type: integer
        name:
          type: string
        nickname:
          description: Self-chosen display name; null when unset. Overrides name for display (precedence nickname ?? name ?? email). See ADR 10
          type:
            - string
            - "null"
        role:
          description: "Access tier (see ADR 10): admin and friend are allowlist-conferred, everyone else is member"
          enum:
            - admin
            - friend
            - member
          type: string
      required:
        - id
        - email
        - name
        - avatar_url
        - nickname
        - role
        - greeted_role
        - default_country_code
      type: object
  securitySchemes:
    bearerAuth:
      scheme: bearer
      type: http
    cookieAuth:
      in: cookie
      name: session
      type: apiKey
info:
  description: Backend API for alifyandra's portfolio site.
  title: Portfolio API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/admin/access-grants:
    get:
      operationId: list-access-grants
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGrantsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: List all access grants
      tags:
        - admin
    post:
      operationId: create-access-grant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrantInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessGrantDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Grant (or update) an access tier for an email
      tags:
        - admin
  /api/admin/access-grants/{email}:
    delete:
      operationId: delete-access-grant
      parameters:
        - description: Email of the grant to revoke (case-insensitive; matched after normalization)
          in: path
          name: email
          required: true
          schema:
            description: Email of the grant to revoke (case-insensitive; matched after normalization)
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Revoke an access grant by email
      tags:
        - admin
  /api/admin/job-kinds:
    get:
      operationId: list-job-kinds
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobKindsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: List the registrable job kinds the worker can dispatch
      tags:
        - admin
  /api/admin/jobs:
    get:
      operationId: list-jobs
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: List the scheduled jobs
      tags:
        - admin
    post:
      operationId: create-job
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDTO"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Register a new scheduled job
      tags:
        - admin
  /api/admin/jobs/{id}:
    patch:
      operationId: update-job
      parameters:
        - description: ScheduledJob DB id
          in: path
          name: id
          required: true
          schema:
            description: ScheduledJob DB id
            format: int64
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Toggle a job or edit its schedule, timezone and runner
      tags:
        - admin
  /api/admin/jobs/{id}/runs:
    get:
      operationId: list-job-runs
      parameters:
        - description: ScheduledJob DB id
          in: path
          name: id
          required: true
          schema:
            description: ScheduledJob DB id
            format: int64
            type: integer
        - description: Max runs to return
          explode: false
          in: query
          name: limit
          schema:
            default: 20
            description: Max runs to return
            format: int64
            maximum: 100
            minimum: 1
            type: integer
        - description: Runs to skip for paging
          explode: false
          in: query
          name: offset
          schema:
            default: 0
            description: Runs to skip for paging
            format: int64
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobRunsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: List a job's run history, newest first
      tags:
        - admin
    post:
      operationId: start-job-run
      parameters:
        - description: ScheduledJob DB id
          in: path
          name: id
          required: true
          schema:
            description: ScheduledJob DB id
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartJobRunOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Force-start a manual run for a job
      tags:
        - admin
  /api/admin/playlists:
    get:
      operationId: list-playlists
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlaylistsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: List the curated Spotify playlists
      tags:
        - admin
    post:
      operationId: create-playlist
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaylistInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistDTO"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Add a curated Spotify playlist (accepts a URL or bare ID)
      tags:
        - admin
  /api/admin/playlists/reorder:
    post:
      operationId: reorder-playlists
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderPlaylistsInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlaylistsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Set sort_order for a set of curated playlists in one call
      tags:
        - admin
  /api/admin/playlists/{id}:
    delete:
      operationId: delete-playlist
      parameters:
        - description: Playlist DB ID
          in: path
          name: id
          required: true
          schema:
            description: Playlist DB ID
            format: int64
            type: integer
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Remove a curated Spotify playlist
      tags:
        - admin
  /api/admin/projects:
    get:
      operationId: list-admin-projects
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAdminProjectsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: List all projects (including unfeatured) for management
      tags:
        - admin
    post:
      operationId: create-project
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProjectDTO"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Create a project
      tags:
        - admin
  /api/admin/projects/reorder:
    post:
      operationId: reorder-projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderProjectsInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAdminProjectsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Set sort_order for a set of projects in one call
      tags:
        - admin
  /api/admin/projects/{id}:
    delete:
      operationId: delete-project
      parameters:
        - description: Project ID
          in: path
          name: id
          required: true
          schema:
            description: Project ID
            format: int64
            type: integer
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Delete a project
      tags:
        - admin
    patch:
      operationId: update-project
      parameters:
        - description: Project ID
          in: path
          name: id
          required: true
          schema:
            description: Project ID
            format: int64
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProjectDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Update a project (partial; includes featured toggle and sort_order)
      tags:
        - admin
  /api/admin/tokens:
    get:
      operationId: list-api-tokens
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTokensOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: List the external-runner API tokens
      tags:
        - admin
    post:
      operationId: mint-api-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MintTokenInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MintTokenOutputBody"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Mint an external-runner API token (raw value returned once)
      tags:
        - admin
  /api/admin/tokens/{id}:
    delete:
      operationId: revoke-api-token
      parameters:
        - description: ApiToken DB id
          in: path
          name: id
          required: true
          schema:
            description: ApiToken DB id
            format: int64
            type: integer
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - cookieAuth: []
      summary: Revoke an external-runner API token by id
      tags:
        - admin
  /api/admin/uploads/presign:
    post:
      operationId: create-upload-presign
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignUploadInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignUploadOutputBody"
