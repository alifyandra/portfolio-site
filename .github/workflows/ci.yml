name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (build, vet, test, spec)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      # Ent must be generated BEFORE any module resolution, otherwise the
      # not-yet-generated ./ent/* packages look like missing remote modules.
      - name: Generate Ent client
        run: go generate ./ent

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Check OpenAPI spec is up to date
        run: |
          go run ./cmd/spec > /tmp/openapi.yaml
          if ! diff -u openapi.yaml /tmp/openapi.yaml; then
            echo "::error::openapi.yaml is stale. Run 'make generate-spec' and commit the result."
            exit 1
          fi

  frontend:
    name: Frontend (codegen, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Generate API hooks from spec
        run: npm run codegen

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
