name: Terraform

# Plan on PRs that touch the IaC (read-only role). Apply is manual via
# workflow_dispatch (write role) so infra never mutates unattended on merge.
#
# ADR 9 envisioned a required-reviewer gate on the `production` Environment, but
# that protection is unavailable for a private repo on the Free plan. The manual
# trigger is the gate instead; the `production` Environment is still referenced
# so the apply role's OIDC trust (sub = ...:environment:production) holds.

on:
  pull_request:
    paths:
      - "deploy/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch: {}

concurrency:
  group: terraform
  cancel-in-progress: false

defaults:
  run:
    working-directory: deploy/terraform

env:
  AWS_REGION: ap-southeast-2
  # cloudflare provider reads this; set as a repo secret.
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  # zone id is not secret but lives in repo secrets to avoid hardcoding.
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.TF_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init
        run: terraform init -input=false

      - name: Validate
        run: terraform validate

      - name: Plan
        run: terraform plan -input=false -no-color

  apply:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Manual trigger is the gate (see header). The Environment is kept so the
    # apply role's OIDC sub remains ...:environment:production.
    environment: production
    permissions:
      id-token: write # OIDC
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Init
        run: terraform init -input=false

      - name: Apply
        run: terraform apply -input=false -auto-approve
