name: Terraform

# Plan on PRs that touch the IaC (read-only role). Apply on merge to main behind
# a gated GitHub Environment (write role + required reviewer). See ADR 9.

on:
  pull_request:
    paths:
      - "deploy/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "deploy/terraform/**"
      - ".github/workflows/terraform.yml"

concurrency:
  group: terraform
  cancel-in-progress: false

defaults:
  run:
    working-directory: deploy/terraform

env:
  AWS_REGION: ap-southeast-2
  # cloudflare provider reads this; set as a repo secret.
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  # zone id is not secret but lives in repo secrets to avoid hardcoding.
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.TF_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init
        run: terraform init -input=false

      - name: Validate
        run: terraform validate

      - name: Plan
        run: terraform plan -input=false -no-color

  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Required-reviewer gate is configured on this Environment in repo settings.
    environment: production
    permissions:
      id-token: write # OIDC
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Init
        run: terraform init -input=false

      - name: Apply
        run: terraform apply -input=false -auto-approve
