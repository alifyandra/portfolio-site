name: Deploy Backend

# Builds the backend image, pushes to GHCR, and redeploys the EC2 host over SSM.
# Frontend deploys are handled by Vercel's own GitHub integration.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.prod.yml"
      - "deploy/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/portfolio-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      # QEMU emulates the tiny apk/adduser RUN in the arm64 runtime stage. The
      # Go build itself cross-compiles natively (CGO_ENABLED=0), so it stays fast.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          # arm64 for the t4g.micro host; amd64 kept for local/dev parity.
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for AWS OIDC
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Resolve the live instance by tag rather than a static secret. The box is
      # cattle: a Terraform user_data change replaces it (the EIP stays put), and
      # a hardcoded EC2_INSTANCE_ID would then point at a terminated instance the
      # app-deploy role no longer permits. The Name tag is set in compute.tf.
      - name: Resolve EC2 instance ID by tag
        id: target
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=portfolio-app" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No running instance found for tag:Name=portfolio-app"; exit 1
          fi
          if [ "$(echo "$INSTANCE_ID" | wc -w)" -ne 1 ]; then
            echo "::error::Expected exactly one running instance, got: $INSTANCE_ID"; exit 1
          fi
          echo "Resolved instance: $INSTANCE_ID"
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Trigger redeploy on EC2 via SSM
        env:
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.sha }}" \
            --parameters '{"commands":[
              "set -e",
              "cd /opt/portfolio",
              "export IMAGE_TAG=${{ github.sha }}",
              "docker compose -f docker-compose.prod.yml pull api worker",
              "docker compose -f docker-compose.prod.yml up -d"
            ]}' \
            --query "Command.CommandId" --output text)
          echo "Sent SSM command $CMD_ID; waiting for completion…"
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" || true
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Output:StandardOutputContent,Err:StandardErrorContent}" \
            --output json
